objectives:
- id: obj-001
  status: completed
  statement: Add dedicated A5B1 staged pipeline runner and sbatch entrypoint.
  methodology: >
    Built run_complete_tagged_pipeline.sh and submit_complete_tagged_pipeline_slurm.sh
    under pipelines/protenix-a5b1/scripts. Pipeline chains setup, input building,
    two-stage protenix pred, and merge into final CIF/PDB.
  metrics:
    scripts_added: 5
    stages: 2
    outputs: [CIF, PDB]
  figures:
  - results/obj-001-a5b1-pipeline-architecture.png
  conclusions: >
    End-to-end staged pipeline enables heterodimer + SpyTag + Streptavidin assembly
    with deterministic ranking_score selection and receptor-aligned merging.
  connects_to: obj-002
  completed_date: '2026-03-06'
- id: obj-002
  status: completed
  statement: Add deterministic stage-merging utility for final tagged complex export.
  methodology: >
    Implemented merge_staged_tagged_complex.py which receptor-aligns stage-1 and
    stage-2 predictions to the accepted heterodimer frame, extracts ligand chains,
    and writes a single merged CIF/PDB output.
  metrics:
    alignment_method: receptor RMSD minimization
    output_formats: [CIF, PDB]
  figures:
  - results/obj-002-stage-merging-architecture.png
  conclusions: >
    Deterministic merging avoids manual structure alignment; ligand placements from
    independent stages are guaranteed compatible via shared receptor reference frame.
  connects_to: obj-003
  completed_date: '2026-03-06'
- id: obj-003
  status: completed
  statement: Build PACE minimal remote control script with smoke test validation.
  methodology: >
    Created pace_minimal.sh with check/submit/watch/fetch/smoke commands. Supports
    SSH control sockets, configurable poll intervals, and rsync artifact fetching.
    Validated with smoke jobs 4734209 and 4734230 on PACE Phoenix cluster.
  metrics:
    commands: 5
    smoke_jobs_validated: 2
    gpu_target: RTX_6000
  figures:
  - results/obj-003-pace-remote-control.png
  conclusions: >
    Non-interactive PACE orchestration eliminates manual SSH sessions. Smoke test
    confirmed full submit/watch/fetch cycle works end-to-end with RTX_6000 queues.
  connects_to: obj-004
  completed_date: '2026-03-09'
- id: obj-004
  status: completed
  statement: Add Claude skill for deterministic PACE job operations.
  methodology: >
    Created .claude/skills/pace-slurm-ops/SKILL.md with trigger conditions, preflight
    checklist, smoke/real pipeline workflows, and failure handling documentation.
    Added CLAUDE.md discovery pointer so agents find the skill automatically.
  metrics:
    failure_modes_documented: 4
    workflow_types: [smoke, real_pipeline, status_check]
  figures:
  - results/obj-004-pace-skill-integration.png
  conclusions: >
    Claude agents now follow a deterministic flow for PACE interactions instead of
    re-deriving SSH/SLURM commands each time. Reduces errors from ad-hoc scripting.
  completed_date: '2026-03-10'
- id: obj-005
  status: completed
  statement: Build AVB3 conformer generation and pseudo-AFM image pipeline.
  methodology: >
    Created pipelines/avb3-conformers/ with 5-stage workflow: steered MD (RoyalMD
    pull), trajectory splitting, equilibrium relaxation, frame collection, and
    pseudo-AFM image generation via afmfold. Includes SLURM scripts for PACE
    (RTX 6000) and a Python processing script that computes inter-domain CVs
    and generates morphological AFM simulations.
  metrics:
    scripts_created: 5
    stages: 5
    afm_image_size: 35x35
    domain_cvs: 3
    slurm_gpu: RTX_6000
  figures:
  - figures/avb3_conformer_pipeline.png
  conclusions: >
    End-to-end pipeline automates the manual workflow of pull→split→relax→collect→AFM.
    Pseudo-AFM images with CV labels can serve as training data for the afmfold CNN
    even without real HS-AFM data.
  connects_to: obj-006
  completed_date: '2026-03-18'
- id: obj-006
  status: completed
  statement: MSA-subsampled Protenix validation shows conformer validity filter works.
  methodology: >
    Ran Protenix at full MSA (100%) and 5% subsample on AVB3 integrin via PACE A100.
    Scored 19 pulled MD frames (0-300) against predictions using Kabsch CA-RMSD and
    approximate TM-score. Tested whether MSA depth diversifies predicted conformations.
  metrics:
    frames_scored: 19
    msa_depths_tested: 2
    tm_score_frame_0: 0.962
    tm_score_frame_300: 0.057
    rmsd_frame_0_angstrom: 3.2
    rmsd_frame_300_angstrom: 164.2
    protenix_msa_sensitivity: "none (full vs 5% differ by <0.001 TM)"
  figures:
  - figures/msa_validation_test.png
  conclusions: >
    TM-score drops monotonically from 0.96 (bent, frame 0) to 0.06 (impossible,
    frame 300), validating the conformer scoring methodology. However, Protenix is
    MSA-depth-invariant for AVB3 — full and 5% MSA produce identical predictions.
    AF2 may show the MSA-depth sensitivity reported in literature. Pivoting to AF2.
  connects_to: obj-007
  completed_date: '2026-03-20'
- id: obj-007
  status: in_progress
  statement: Test AF2 MSA-depth sensitivity and install ProteinTTT with OpenFold.
  methodology: >
    Submitted AF2 2.3.2 multimer with full vs reduced MSA databases on PACE A100
    (job 5139051). Submitted OpenFold+ProteinTTT GPU install (job 5139050) to build
    openfold from source with nvcc on A100.
  metrics:
    pace_jobs: [5139050, 5139051]
  figures: []
  conclusions: Pending PACE job completion.
  connects_to: null
  completed_date: null
