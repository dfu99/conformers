objectives:
- id: obj-001
  status: completed
  statement: Add dedicated A5B1 staged pipeline runner and sbatch entrypoint.
  methodology: >
    Built run_complete_tagged_pipeline.sh and submit_complete_tagged_pipeline_slurm.sh
    under pipelines/protenix-a5b1/scripts. Pipeline chains setup, input building,
    two-stage protenix pred, and merge into final CIF/PDB.
  metrics:
    scripts_added: 5
    stages: 2
    outputs: [CIF, PDB]
  figures:
  - results/obj-001-a5b1-pipeline-architecture.png
  conclusions: >
    End-to-end staged pipeline enables heterodimer + SpyTag + Streptavidin assembly
    with deterministic ranking_score selection and receptor-aligned merging.
  connects_to: obj-002
  completed_date: '2026-03-06'
- id: obj-002
  status: completed
  statement: Add deterministic stage-merging utility for final tagged complex export.
  methodology: >
    Implemented merge_staged_tagged_complex.py which receptor-aligns stage-1 and
    stage-2 predictions to the accepted heterodimer frame, extracts ligand chains,
    and writes a single merged CIF/PDB output.
  metrics:
    alignment_method: receptor RMSD minimization
    output_formats: [CIF, PDB]
  figures:
  - results/obj-002-stage-merging-architecture.png
  conclusions: >
    Deterministic merging avoids manual structure alignment; ligand placements from
    independent stages are guaranteed compatible via shared receptor reference frame.
  connects_to: obj-003
  completed_date: '2026-03-06'
- id: obj-003
  status: completed
  statement: Build PACE minimal remote control script with smoke test validation.
  methodology: >
    Created pace_minimal.sh with check/submit/watch/fetch/smoke commands. Supports
    SSH control sockets, configurable poll intervals, and rsync artifact fetching.
    Validated with smoke jobs 4734209 and 4734230 on PACE Phoenix cluster.
  metrics:
    commands: 5
    smoke_jobs_validated: 2
    gpu_target: RTX_6000
  figures:
  - results/obj-003-pace-remote-control.png
  conclusions: >
    Non-interactive PACE orchestration eliminates manual SSH sessions. Smoke test
    confirmed full submit/watch/fetch cycle works end-to-end with RTX_6000 queues.
  connects_to: obj-004
  completed_date: '2026-03-09'
- id: obj-004
  status: completed
  statement: Add Claude skill for deterministic PACE job operations.
  methodology: >
    Created .claude/skills/pace-slurm-ops/SKILL.md with trigger conditions, preflight
    checklist, smoke/real pipeline workflows, and failure handling documentation.
    Added CLAUDE.md discovery pointer so agents find the skill automatically.
  metrics:
    failure_modes_documented: 4
    workflow_types: [smoke, real_pipeline, status_check]
  figures:
  - results/obj-004-pace-skill-integration.png
  conclusions: >
    Claude agents now follow a deterministic flow for PACE interactions instead of
    re-deriving SSH/SLURM commands each time. Reduces errors from ad-hoc scripting.
  completed_date: '2026-03-10'
- id: obj-005
  status: completed
  statement: Build AVB3 conformer generation and pseudo-AFM image pipeline.
  methodology: >
    Created pipelines/avb3-conformers/ with 5-stage workflow: steered MD (RoyalMD
    pull), trajectory splitting, equilibrium relaxation, frame collection, and
    pseudo-AFM image generation via afmfold. Includes SLURM scripts for PACE
    (RTX 6000) and a Python processing script that computes inter-domain CVs
    and generates morphological AFM simulations.
  metrics:
    scripts_created: 5
    stages: 5
    afm_image_size: 35x35
    domain_cvs: 3
    slurm_gpu: RTX_6000
  figures:
  - figures/avb3_conformer_pipeline.png
  conclusions: >
    End-to-end pipeline automates the manual workflow of pull→split→relax→collect→AFM.
    Pseudo-AFM images with CV labels can serve as training data for the afmfold CNN
    even without real HS-AFM data.
  connects_to: obj-006
  completed_date: '2026-03-18'
- id: obj-006
  status: completed
  statement: MSA-subsampled Protenix validation shows conformer validity filter works.
  methodology: >
    Ran Protenix at full MSA (100%) and 5% subsample on AVB3 integrin via PACE A100.
    Scored 19 pulled MD frames (0-300) against predictions using Kabsch CA-RMSD and
    approximate TM-score. Tested whether MSA depth diversifies predicted conformations.
  metrics:
    frames_scored: 19
    msa_depths_tested: 2
    tm_score_frame_0: 0.962
    tm_score_frame_300: 0.057
    rmsd_frame_0_angstrom: 3.2
    rmsd_frame_300_angstrom: 164.2
    protenix_msa_sensitivity: "none (full vs 5% differ by <0.001 TM)"
  figures:
  - figures/msa_validation_test.png
  conclusions: >
    TM-score drops monotonically from 0.96 (bent, frame 0) to 0.06 (impossible,
    frame 300), validating the conformer scoring methodology. However, Protenix is
    MSA-depth-invariant for AVB3 — full and 5% MSA produce identical predictions.
    AF2 may show the MSA-depth sensitivity reported in literature. Pivoting to AF2.
  connects_to: obj-007
  completed_date: '2026-03-20'
- id: obj-007
  status: completed
  statement: AF2 also locked to bent conformation — no MSA-depth conformational diversity.
  methodology: >
    Ran AF2 2.3.2 multimer with reduced_dbs on AVB3 via PACE A100 (job 5357284).
    Scored all 25 ranked predictions against 19 pulled MD frames (0-300) using
    Kabsch CA-RMSD and TM-score. Compared AF2 vs Protenix scoring profiles.
  metrics:
    af2_models_scored: 25
    af2_pairwise_rmsd_range: "0.1-2.9 Å"
    af2_tm_frame_0: 0.986
    af2_tm_frame_300: 0.055
    af2_vs_protenix_tm_diff: "<0.03 at all frames"
    af2_confidence_range: "0.856-0.890 iptm+ptm"
  figures:
  - figures/af2_vs_protenix_validation.png
  conclusions: >
    AF2 also predicts only the bent conformation for AVB3. All 25 models have
    pairwise RMSD 0.1-2.9Å. TM-score profile nearly identical to Protenix.
    The bent state is too dominant in PDB training data for either method to
    sample extended conformations via MSA subsampling. Physics-based approaches
    (steered MD) remain the only viable conformer generation method.
  connects_to: obj-008
  completed_date: '2026-03-23'
- id: obj-008
  status: in_progress
  statement: AFCluster per-chain sweep and ProteinTTT install for AVB3 baselines.
  methodology: >
    Submitted AFCluster per-chain BoltzGen sweep (job 5390044) running on individual
    chains to avoid full-heterodimer cuBLAS crash. Submitted ProteinTTT install fix
    (job 5390102) with python3 -m pip to avoid module path issues.
  metrics:
    pace_jobs: [5390044, 5390102]
  figures: []
  conclusions: Pending PACE job completion.
  connects_to: obj-009
  completed_date: null
- id: obj-009
  status: completed
  statement: AF2 pLDDT identifies flexible leg/tail domains that move most during pulling.
  methodology: >
    Extracted per-residue pLDDT from AF2 ranked_0 prediction and overlaid with
    per-residue CA displacement between AF2 bent prediction and each pulled MD
    frame (0, 30, 60, 90, 120, 180, 300). Analyzed per-domain confidence.
  metrics:
    overall_plddt: 90.5
    chain_a_plddt: 91.4
    chain_b_plddt: 89.2
    head_thigh_plddt: 96.8
    legs_tail_plddt_a: 82.8
    egf_tail_plddt_b: 83.6
    low_confidence_residues_pct: 5.6
  figures:
  - figures/af2_plddt_vs_displacement.png
  conclusions: >
    AF2 cannot score arbitrary PDBs directly, but its pLDDT distribution on the
    bent prediction identifies leg/tail domains as least confident (82-84),
    matching the regions with largest steered MD displacement. AF2 already
    "knows" these regions are flexible. TM-score serves as practical conformer
    validity filter. ProteinTTT is needed for per-sequence confidence shifts.
  connects_to: null
  completed_date: '2026-03-23'
- id: obj-010
  status: completed
  statement: Domain steering identifies CV distance bias as the effective conformer generation method.
  methodology: >
    Ran 4 domain-preserving steering presets on AVB3 integrin (RunPod A5000, OpenMM):
    gentle_open (angle torque k=50), moderate_open (k=200), restrained_pull (position
    restraints + centroid pulling), cv_distance_extend (flat-bottom distance biases k=200,
    targets 16-20nm). 1ns production each. Compared inter-domain angles and distances
    pre/post steering.
  metrics:
    presets_completed: 3
    presets_failed: 1
    gentle_open_delta_angle: -4.5
    moderate_open_delta_angle: -0.2
    cv_distance_extend_delta_angle: +88.2
    cv_distance_extend_delta_distance_A: +112.7
    simulation_speed_nsday: 27.9
    gpu: RTX_A5000
  figures:
  - figures/domain_steering_comparison.png
  - figures/steering_renders/avb3_starting_yaw.mp4
  - figures/steering_renders/avb3_cv_extend_yaw.mp4
  conclusions: >
    CV distance biasing is the only effective steering method for AVB3 integrin
    opening in 1ns. Angle torques at k=50-200 produce negligible change. Position
    restraints + pulling is numerically unstable (NaN). The CV method opened the
    alpha-leg by 88 degrees and extended head-tail distance by 113 Angstroms.
  connects_to: obj-011
  completed_date: '2026-04-08'
- id: obj-011
  status: in_progress
  statement: Build AFMFold CNN pipeline for HS-AFM to integrin conformer prediction.
  methodology: >
    Built end-to-end pipeline: train_afmfold_cnn.py (steering frames → AFM images →
    CNN training) and predict_from_afm_gif.py (HS-AFM GIF → CV prediction → conformer
    matching). Uses afmfold's C8-equivariant CNN and simulated AFM image generator.
    Steering re-run with frame saving launched on CPU for training data generation.
  metrics:
    scripts_created: 2
    domain_pairs: 3
    cnn_architecture: C8_equivariant
    image_size: 35x35
  figures: []
  conclusions: >
    Pipeline scripts complete. Awaiting steering frame generation (~300 frames from
    1ns trajectory) to train CNN. Once trained, user can provide HS-AFM GIF and get
    conformational state predictions per frame.
  connects_to: null
  completed_date: null
